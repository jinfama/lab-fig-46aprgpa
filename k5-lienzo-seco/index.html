<script>
/* ====== Stripes â€” franjas finas (1 por aÃ±o 1850-2024, anomalÃ­as reales) ====== */
(function(){
  // AnomalÃ­as HadCRUT5 anuales aproximadas 1850-2024 (vs 1961-1990)
  const CLIMATE = [
    -0.42,-0.23,-0.23,-0.27,-0.29,-0.27,-0.31,-0.46,-0.41,-0.28,
    -0.32,-0.41,-0.51,-0.31,-0.43,-0.25,-0.27,-0.33,-0.31,-0.31,
    -0.31,-0.35,-0.30,-0.34,-0.37,-0.37,-0.32,-0.10,-0.14,-0.26,
    -0.24,-0.20,-0.30,-0.31,-0.40,-0.45,-0.38,-0.41,-0.32,-0.31,
    -0.46,-0.41,-0.49,-0.45,-0.50,-0.45,-0.27,-0.29,-0.27,-0.17,
    -0.13,-0.22,-0.40,-0.41,-0.37,-0.43,-0.42,-0.42,-0.48,-0.55,
    -0.46,-0.46,-0.47,-0.41,-0.27,-0.35,-0.46,-0.39,-0.33,-0.29,
    -0.30,-0.22,-0.30,-0.30,-0.28,-0.15,-0.21,-0.29,-0.31,-0.30,
    -0.20,-0.14,-0.15,-0.19,-0.22,-0.20,-0.04,-0.05,-0.10, 0.01,
    -0.06,-0.10,-0.20,-0.05,-0.07,-0.08, 0.00,-0.08,-0.04,-0.07,
    -0.14,-0.15,-0.07,-0.04,-0.07,-0.09, 0.05, 0.03, 0.02, 0.10,
     0.06,-0.13,-0.11,-0.18,-0.06,-0.02,-0.07, 0.03, 0.06,-0.20,
    -0.07,-0.10,-0.05, 0.06,-0.20,-0.12, 0.06,-0.08, 0.05, 0.03,
     0.13, 0.27, 0.12, 0.14, 0.31, 0.16, 0.13, 0.18, 0.42, 0.28,
     0.21, 0.42, 0.23, 0.24, 0.32, 0.45, 0.33, 0.48, 0.61, 0.39,
     0.40, 0.55, 0.62, 0.54, 0.68, 0.64, 0.67, 0.55, 0.62, 0.69,
     0.55, 0.62, 0.75, 0.91, 1.01, 0.92, 0.85, 0.98, 1.02, 1.16,
     1.18, 1.45
  ];
  function tempColor(v){
    const t = Math.max(0, Math.min(1, (v + 0.6) / 2.0));
    let r,g,b;
    if(t < 0.5){
      const s = t * 2;
      r = Math.round(20 + s * 235); g = Math.round(50 + s * 205); b = Math.round(180 + s * 75);
    } else {
      const s = (t - 0.5) * 2;
      r = 255; g = Math.round(255 - s * 220); b = Math.round(255 - s * 240);
    }
    return `rgb(${r},${g},${b})`;
  }
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("stripes-svg");
  if(!svg) return;
  const N = CLIMATE.length;  // ~175 aÃ±os
  svg.setAttribute("viewBox", "0 0 1000 600");
  svg.setAttribute("preserveAspectRatio", "none");
  const w = 1000 / N;
  for(let i = 0; i < N; i++){
    const r = document.createElementNS(ns, "rect");
    r.setAttribute("x", i * w);
    r.setAttribute("y", 0);
    r.setAttribute("width", w + 0.3);
    r.setAttribute("height", 600);
    r.setAttribute("fill", tempColor(CLIMATE[i]));
    r.setAttribute("opacity", 0);
    r.style.transition = "opacity 1.2s ease";
    svg.appendChild(r);
  }
  function show(){
    const rects = svg.querySelectorAll("rect");
    rects.forEach((r, i) => {
      setTimeout(() => { r.setAttribute("opacity", 1); }, i * 8);
    });
    setTimeout(() => {
      let t = 0;
      function tick(){
        t += 0.012;
        rects.forEach((r, i) => {
          const op = 0.88 + Math.sin(t + i * 0.04) * 0.10;
          r.setAttribute("opacity", op.toFixed(3));
        });
        requestAnimationFrame(tick);
      }
      tick();
    }, N * 8 + 600);
  }
  let started = false;
  window.addEventListener("portada-mode", e => {
    if(e.detail === "franjas" && !started){ started = true; show(); }
  });
})();

/* ====== Portada mode switcher ====== */
(function(){
  const portada = document.getElementById("portada");
  const btns = document.querySelectorAll(".portada-mode-switch button");
  function apply(mode){
    portada.classList.toggle("mode-globo", mode === "globo");
    portada.classList.toggle("mode-franjas", mode === "franjas");
    btns.forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    try { localStorage.setItem("cahe_portada_mode", mode); } catch(_){}
    window.dispatchEvent(new CustomEvent("portada-mode", { detail: mode }));
  }
  btns.forEach(b => b.addEventListener("click", () => apply(b.dataset.mode)));
  let initial = "globo";
  try { const saved = localStorage.getItem("cahe_portada_mode"); if(saved === "franjas") initial = "franjas"; } catch(_){}
  apply(initial);
})();

setTimeout(function(){
  ['hero-kicker','hero-title','hero-sub','hero-info'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.classList.add('visible');
  });
  var cards = document.querySelectorAll('.hero-nav-card');
  cards.forEach(function(c, i){ setTimeout(function(){ c.classList.add('visible'); }, 600 + i * 120); });
}, 400);

(function(){
  var frame = document.getElementById('viewer-frame');
  function openSection(section){
    if(!frame.src) frame.src = 'explorer.html#' + section;
    else { try { frame.contentWindow.location.hash = section; } catch(_){} }
    document.body.classList.add('viewer-open');
    setTimeout(function(){ try { frame.contentWindow && frame.contentWindow.focus(); } catch(_){} }, 60);
  }
  document.querySelectorAll('[data-section]').forEach(function(el){
    el.addEventListener('click', function(e){ e.preventDefault(); openSection(el.dataset.section); });
  });
  window.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && document.body.classList.contains('viewer-open')){
      document.body.classList.remove('viewer-open');
    }
  });
  window.addEventListener('message', function(e){
    if(e.data && e.data.type === 'cahe-back') document.body.classList.remove('viewer-open');
  });
})();
</script>
