<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>whep — dashboard</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #fafafa;
    color: #222;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 10px 16px 0 16px;
    flex-shrink: 0;
  }
  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  .meta {
    color: #888;
    font-size: 11px;
  }
  nav.tabs {
    display: flex;
    gap: 0;
    margin-top: 10px;
    border-bottom: none;
  }
  nav.tabs button {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #666;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: -1px;
  }
  nav.tabs button:hover {
    color: #222;
  }
  nav.tabs button.active {
    color: #c0392b;
    border-bottom-color: #c0392b;
    font-weight: 600;
  }
  nav.tabs .badge {
    display: inline-block;
    background: #eee;
    color: #777;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 6px;
    vertical-align: middle;
  }
  nav.tabs button.active .badge {
    background: #c0392b;
    color: #fff;
  }
  main {
    flex: 1 1 auto;
    position: relative;
    background: #fff;
  }
  .tab-pane {
    display: none;
    height: 100%;
    width: 100%;
  }
  .tab-pane.active {
    display: block;
  }
  .tab-pane iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .empty-pane {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #888;
    font-size: 13px;
    font-style: italic;
    padding: 20px;
    text-align: center;
  }
  .empty-pane code {
    font-style: normal;
    background: #f4f4f4;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
  }
  .papers-toolbar {
    background: #fafafa;
    border-bottom: 1px solid #e0e0e0;
    padding: 6px 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .papers-toolbar label {
    color: #666;
    font-size: 11px;
    margin-right: 4px;
  }
  .papers-toolbar button {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    color: #444;
  }
  .papers-toolbar button.active {
    background: #c0392b;
    color: #fff;
    border-color: #c0392b;
  }
  .papers-toolbar button:hover:not(.active) {
    background: #f0f0f0;
  }
  #papers-pane .papers-body {
    height: calc(100% - 36px);
  }
  #papers-pane iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <h1>whep</h1>
    <div class="meta">actualizado 2026-05-10 22:55</div>
  </div>
  <nav class="tabs">
    <button data-tab="status" class="active">Status</button>
    <button data-tab="figures">Figures<span class="badge">55</span></button>
    <button data-tab="papers">Papers<span class="badge">1</span></button>
  </nav>
</header>
<main>
  <div class="tab-pane active" id="status-pane">
    <iframe src="_status.html" title="Status"></iframe>
  </div>
  <div class="tab-pane" id="figures-pane">
    <iframe src="_figures.html" title="Figures"></iframe>
  </div>
  <div class="tab-pane" id="papers-pane">
    <div class="papers-toolbar"><label>Manuscript:</label><button class="active" data-src="_papers/whep-data-descriptor.html">whep_data_descriptor</button></div><div class="papers-body"><iframe id="papers-frame" src="_papers/whep-data-descriptor.html" title="Paper"></iframe></div>
  </div>
</main>
<script>
  // Tab switching
  const tabButtons = document.querySelectorAll('nav.tabs button');
  const panes = document.querySelectorAll('.tab-pane');
  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      tabButtons.forEach(b => b.classList.toggle('active', b === btn));
      panes.forEach(p => p.classList.toggle('active', p.id === tab + '-pane'));
      // Update URL hash for shareable tab links
      history.replaceState(null, '', '#' + tab);
    });
  });
  // Restore tab from URL hash on load
  if (window.location.hash) {
    const hashTab = window.location.hash.slice(1);
    const btn = document.querySelector(`nav.tabs button[data-tab="${hashTab}"]`);
    if (btn) btn.click();
  }

  // Papers sub-nav
  const papersBtns = document.querySelectorAll('.papers-toolbar button');
  const papersFrame = document.getElementById('papers-frame');
  papersBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      papersBtns.forEach(b => b.classList.toggle('active', b === btn));
      if (papersFrame) papersFrame.src = btn.dataset.src;
    });
  });
</script>
</body>
</html>
